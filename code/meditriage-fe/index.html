<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AI-powered patient triage system for streamlining OPD workflows with intelligent interview and SOAP note generation." />
  <meta name="theme-color" content="#17406E" />
  <link rel="icon" href="/assets/branding/MediTriageFav.png" type="image/png" />
  <title>MediTriage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f2f2f7;
      color: #1c1c1e;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d1d6;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #aeaeb2;
    }

    button:focus,
    button:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }

    input,
    textarea,
    select {
      outline: none !important;
      box-shadow: none !important;
      color: #17406E !important;
      border: 2px solid rgb(240 242 247 / var(--tw-bg-opacity, 1)) !important;
    }

    .chat-input {
      outline: none !important;
      border: none !important;
      box-shadow: none !important;
      color: #1a1a1a !important;
    }

    .chat-input:focus {
      outline: none !important;
      border: none !important;
      box-shadow: none !important;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none !important;
      box-shadow: none !important;
      border: 2px solid #17406E !important;
    }

    .ios-blur {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ── Global Animation Keyframes ─────────────────────────── */

    /* Sidebar: slides in from left */
    @keyframes slideInFromLeft {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .animate-slide-in-left {
      animation: slideInFromLeft 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Header: slides down from top */
    @keyframes slideDownFromTop {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-down {
      animation: slideDownFromTop 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      opacity: 0;
    }

    /* Modal backdrop fade in / out */
    @keyframes backdropFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes backdropFadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    /* Modal content scale in / out */
    @keyframes modalScaleIn {
      from {
        transform: scale(0.92) translateY(12px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes modalScaleOut {
      from {
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      to {
        transform: scale(0.92) translateY(12px);
        opacity: 0;
      }
    }

    .animate-modal-backdrop-in {
      animation: backdropFadeIn 0.25s ease forwards;
    }

    .animate-modal-backdrop-out {
      animation: backdropFadeOut 0.2s ease forwards;
    }

    .animate-modal-content-in {
      animation: modalScaleIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .animate-modal-content-out {
      animation: modalScaleOut 0.2s ease forwards;
    }

    /* Toast: slides in from right, out to right */
    @keyframes toastSlideIn {
      from {
        transform: translateX(120%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes toastSlideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(120%);
        opacity: 0;
      }
    }

    .animate-toast-in {
      animation: toastSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .animate-toast-out {
      animation: toastSlideOut 0.35s ease forwards;
    }

    /* General fade-in */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    /* KPI Widget: staggered rise-up with scale */
    @keyframes widgetRiseUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-widget-0 {
      opacity: 0;
      animation: widgetRiseUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .animate-widget-1 {
      opacity: 0;
      animation: widgetRiseUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.22s forwards;
    }

    .animate-widget-2 {
      opacity: 0;
      animation: widgetRiseUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.34s forwards;
    }

    .animate-widget-3 {
      opacity: 0;
      animation: widgetRiseUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    /* Content body transition (used when switching care setting) */
    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-content-enter {
      animation: contentFadeIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
